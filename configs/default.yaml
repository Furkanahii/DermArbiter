# DermArbiter — General Settings (Root Configuration)
# ═══════════════════════════════════════════════════════════════
# This is the top-level config. Sub-configs are loaded from the
# files listed under config_includes.
# ═══════════════════════════════════════════════════════════════

# ───────────────────────────────────────────────────────────────
# Sub-config references (loaded by the config loader)
# ───────────────────────────────────────────────────────────────
config_includes:
  - configs/agents.yaml
  - configs/tools.yaml
  - configs/benchmarks.yaml
  - configs/experiments.yaml

# ───────────────────────────────────────────────────────────────
# General
# ───────────────────────────────────────────────────────────────
general:
  project_name: dermarbiter
  version: "0.1.0"
  debug: false
  log_level: INFO    # DEBUG, INFO, WARNING, ERROR, CRITICAL
  seed: 42

# ───────────────────────────────────────────────────────────────
# Paths
# ───────────────────────────────────────────────────────────────
paths:
  output_dir: outputs/
  log_dir: outputs/logs/
  cache_dir: outputs/cache/
  config_dir: configs/
  weights_dir: weights/           # Model weights directory
  data_dir: data/                 # Dataset directory
  experiments_dir: experiments/   # Experiment scripts
  results_dir: results/           # Experiment results

# ───────────────────────────────────────────────────────────────
# Runtime
# ───────────────────────────────────────────────────────────────
runtime:
  device: auto       # auto, cuda, cpu, mps
  num_workers: 4
  max_retries: 3
  timeout_seconds: 120

# ═══════════════════════════════════════════════════════════════
# Experiment Tracking
# ═══════════════════════════════════════════════════════════════
experiment:
  name: "default"
  tags: []
  save_predictions: true          # Save per-sample predictions
  save_debate_logs: true          # Save full debate transcripts
  save_evidence_cards: true       # Save evidence cards to JSON
  results_dir: outputs/results/

# ═══════════════════════════════════════════════════════════════
# Data & Model Paths
# ═══════════════════════════════════════════════════════════════
data:
  chroma_cases_dir: data/chroma_cases/
  chroma_guidelines_dir: data/chroma_guidelines/
  ontology_json: data/skin_disease_ontology.json

# ═══════════════════════════════════════════════════════════════
# Environment Variable Overrides
# ═══════════════════════════════════════════════════════════════
# The following env vars override config values at runtime:
#   GOOGLE_API_KEY    → agents.specialist.api_key / agents.moderator.api_key
#   OPENAI_API_KEY    → OpenAI API client configuration (for GPT-4o baselines)
#   GROQ_API_KEY      → Groq API client configuration
#   HF_TOKEN          → agents.generalist.hf_token / agents.skeptic.hf_token
#   HF_HOME           → paths.cache_dir (HuggingFace models)
#   CHROMA_DB_PATH    → data.chroma_cases_dir / data.chroma_guidelines_dir
#   DERMARBITER_LOG_LEVEL     → general.log_level
#   DERMARBITER_TOKEN_BUDGET  → debate.global_token_budget
#   DERMARBITER_DEFAULT_MODEL → default fallback model in model router

